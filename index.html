<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sleep Timer</title>
<!-- Discord embed meta tags -->
<meta property="og:title" content="🌙 Sleep Timer">
<meta property="og:description" content="A clean sleep countdown timer. Click to open.">
<meta property="og:type" content="website">
<meta name="theme-color" content="#5b8dee">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Mono:wght@300;400&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&family=PP+Neue+Machina:wght@400;700&display=swap" rel="stylesheet">

<style>
    /* ... (all your existing styles remain the same) ... */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07090d;
      --surface: rgba(14,18,26,0.82);
      --surface2: #1a1e28;
      --border: rgba(255,255,255,0.06);
      --accent: #5b8dee;
      --accent-dim: rgba(91,141,238,0.15);
      --accent-glow: rgba(91,141,238,0.3);
      --text-primary: #e8eaf0;
      --text-secondary: #6b7280;
      --text-muted: #3d4452;
      --danger: #e05c5c;
      --success: #4ade80;
    }

    /* ... your existing styles ... */

    /* New styles for username and font selector */
    .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
    }

    .username-container {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--text-primary);
    }

    .username-input {
        background: rgba(255,255,255,0.08);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 8px 14px;
        color: var(--text-primary);
        font-size: 15px;
        width: 180px;
        font-family: 'Syne', sans-serif;
    }

    .username-input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .font-selector {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
    }

    .font-selector select {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 6px 12px;
        color: var(--text-primary);
        font-family: 'Syne', sans-serif;
    }
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="stars" id="stars"></div>
<div class="toast" id="toast">✓ Link copied — paste in Discord!</div>

<div class="card">
    <!-- New Header with Username and Font Selector -->
    <div class="header">
        <div class="username-container">
            <span style="font-size: 22px;">🌙</span>
            <input type="text" id="username" class="username-input" placeholder="Sleeper name" value="Alex">
        </div>
        
        <div class="font-selector">
            <select id="fontSelect">
                <option value="DM Mono">Mono (Default)</option>
                <option value="Inter">Inter</option>
                <option value="Space Grotesk">Space Grotesk</option>
                <option value="Syne">Syne</option>
            </select>
        </div>
    </div>

    <h1 id="timerTitle">Sleep Timer</h1>
    <div class="time-display" id="timeDisplay">07:59:02</div>
    <div class="time-label" id="timeLabel">remaining</div>
    
    <!-- Rest of your card content remains the same -->
    <div class="progress-track">
        <div class="progress-fill" id="progressBar" style="width:100%"></div>
    </div>
    <div class="progress-meta">
        <span id="metaLeft">0% elapsed</span>
        <span id="metaRight">100% left</span>
    </div>
    <div class="done-msg" id="doneMsg">✓ sleep timer finished</div>

    <!-- ... rest of your controls, duration picker, etc. ... -->
    <div class="controls">
        <button class="btn-primary" id="mainBtn" onclick="toggleTimer()">Start</button>
        <button class="btn-ghost" onclick="resetTimer()">Reset</button>
        <button class="btn-share" id="shareBtn" onclick="shareTimer()">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515..."/></svg>
            Share
        </button>
    </div>

    <div class="divider"></div>
    <div class="duration-picker">
        <button class="dur-btn active" data-min="30" onclick="setDuration(30,this)">30m</button>
        <button class="dur-btn" data-min="60" onclick="setDuration(60,this)">1h</button>
        <button class="dur-btn" data-min="120" onclick="setDuration(120,this)">2h</button>
        <button class="dur-btn" data-min="180" onclick="setDuration(180,this)">3h</button>
        <button class="dur-btn" data-min="360" onclick="setDuration(360,this)">6h</button>
        <button class="dur-btn" data-min="480" onclick="setDuration(480,this)">8h</button>
    </div>
    <div class="custom-row">
        <label>Custom</label>
        <div class="time-input-group">
            <input type="number" id="inH" min="0" max="99" value="0">
            <span class="time-sep">:</span>
            <input type="number" id="inM" min="0" max="59" value="0">
            <span class="time-sep">:</span>
            <input type="number" id="inS" min="0" max="59" value="0">
        </div>
        <button class="btn-set" onclick="applyCustom()">Set</button>
    </div>
</div>

<script>
// ... your existing JavaScript ...

// Add these new functions and listeners

const usernameInput = document.getElementById('username');
const fontSelect = document.getElementById('fontSelect');
const timeDisplay = document.getElementById('timeDisplay');
const timerTitle = document.getElementById('timerTitle');

// Update title with username
function updateTitle() {
    const name = usernameInput.value.trim();
    timerTitle.textContent = name ? `${name}'s Sleep Timer` : "Sleep Timer";
}

usernameInput.addEventListener('input', updateTitle);

// Font selector
fontSelect.addEventListener('change', () => {
    const font = fontSelect.value;
    if (font === "DM Mono") {
        timeDisplay.style.fontFamily = "'DM Mono', monospace";
    } else {
        timeDisplay.style.fontFamily = `'${font}', sans-serif`;
    }
});

// Initialize
window.addEventListener('load', () => {
    updateTitle();
    // ... your existing load logic ...
});

// Keep all your existing timer logic (totalSeconds, tick, toggleTimer, etc.)
</script>
</body>
</html>
