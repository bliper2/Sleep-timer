<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sleep Timer</title>
<!-- Discord embed meta tags -->
<meta property="og:title" content="🌙 Sleep Timer">
<meta property="og:description" content="A clean sleep countdown timer. Click to open.">
<meta property="og:type" content="website">
<meta name="theme-color" content="#5b8dee">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Mono:wght@300;400&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">

<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #07090d;
      --surface: rgba(14,18,26,0.82);
      --surface2: #1a1e28;
      --border: rgba(255,255,255,0.06);
      --accent: #5b8dee;
      --accent-dim: rgba(91,141,238,0.15);
      --accent-glow: rgba(91,141,238,0.3);
      --text-primary: #e8eaf0;
      --text-secondary: #6b7280;
      --text-muted: #3d4452;
      --danger: #e05c5c;
      --success: #4ade80;
    }
    html, body {
      height: 100%;
      font-family: 'Syne', sans-serif;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
      background: var(--bg);
    }
    canvas#bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--d) ease-in-out infinite;
      animation-delay: var(--del);
    }
    @keyframes twinkle {
      0%, 100% { opacity: var(--min-op); }
      50% { opacity: var(--max-op); }
    }
    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 32px 52px 40px;
      width: min(500px, 95vw);
      text-align: center;
      z-index: 2;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .username-input {
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 16px;
      color: var(--text-primary);
      font-size: 15px;
      width: 240px;
      font-family: 'Syne', sans-serif;
    }
    .username-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .font-selector {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .font-selector select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 7px 12px;
      color: var(--text-primary);
      font-family: 'Syne', sans-serif;
    }
    .moon-icon {
      font-size: 38px;
      margin-bottom: 12px;
      display: block;
      filter: drop-shadow(0 0 14px rgba(240,201,106,0.5));
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }
    h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 32px;
    }
    .time-display {
      font-family: 'DM Mono', monospace;
      font-size: clamp(52px, 13vw, 76px);
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--text-primary);
      line-height: 1;
      margin-bottom: 8px;
      transition: color 0.5s ease;
    }
    .time-display.ending { color: var(--danger); }
    .time-display.done { color: var(--success); }
    .time-label {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 32px;
    }
    .progress-track {
      position: relative;
      height: 5px;
      background: rgba(255,255,255,0.05);
      border-radius: 99px;
      margin-bottom: 10px;
      overflow: visible;
    }
    .progress-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #2d5bbf 0%, #5b8dee 55%, #94b8ff 100%);
      transition: width 1s linear, background 0.8s ease;
      position: relative;
    }
    .progress-fill.ending { background: linear-gradient(90deg, #922 0%, var(--danger) 100%); }
    .progress-fill.done { background: linear-gradient(90deg, #1a7a40 0%, var(--success) 100%); }
    .progress-fill::after {
      content: '';
      position: absolute;
      right: -1px;
      top: 50%;
      transform: translate(50%, -50%);
      width: 11px; height: 11px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
      transition: background 0.8s, box-shadow 0.8s;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 36px;
    }
    .done-msg {
      display: none;
      font-size: 12px;
      color: var(--success);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 600;
      margin-top: -16px;
      margin-bottom: 18px;
      animation: fadeUp 0.5s ease;
    }
    .done-msg.show { display: block; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 26px;
    }
    button {
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 22px;
      cursor: pointer;
      transition: all 0.15s ease;
      outline: none;
    }
    .btn-primary {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: rgba(91,141,238,0.28);
    }
    .btn-primary:hover { background: rgba(91,141,238,0.24); border-color: rgba(91,141,238,0.45); }
    .btn-primary:active { transform: scale(0.97); }
    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
    }
    .btn-ghost:hover { background: var(--surface2); color: var(--text-primary); }
    .btn-ghost:active { transform: scale(0.97); }
    .btn-share {
      background: transparent;
      color: var(--text-muted);
      border-color: var(--border);
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .btn-share:hover { color: #7289da; border-color: rgba(114,137,218,0.4); background: rgba(114,137,218,0.1); }
    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 -52px 22px;
    }
    .duration-picker {
      display: flex;
      gap: 7px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .dur-btn {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.04em;
      background: transparent;
      color: var(--text-muted);
      border-color: var(--border);
      padding: 7px 13px;
      border-radius: 8px;
      transition: all 0.15s ease;
    }
    .dur-btn:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.14); background: var(--surface2); }
    .dur-btn.active { color: var(--accent); border-color: rgba(91,141,238,0.35); background: var(--accent-dim); }
    .custom-row {
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: center;
    }
    .time-input-group {
      display: flex;
      align-items: center;
      gap: 2px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 0 10px;
      height: 34px;
    }
    .time-input-group input {
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      color: var(--text-primary);
      background: transparent;
      border: none;
      outline: none;
      width: 28px;
      text-align: center;
    }
    .time-sep {
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      color: var(--text-muted);
    }
    .btn-set {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 13px;
      cursor: pointer;
    }
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface2);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px 22px;
      font-size: 13px;
      font-weight: 600;
      color: var(--success);
      opacity: 0;
      transition: all 0.3s;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="stars" id="stars"></div>
<div class="toast" id="toast">✓ Link copied — paste in Discord!</div>

<div class="card">
    <!-- Username and Font Selector -->
    <div class="header">
        <input type="text" id="username" class="username-input" placeholder="Sleeper name" value="Alex">
        
        <div class="font-selector">
            Font:
            <select id="fontSelect">
                <option value="DM Mono">DM Mono (Default)</option>
                <option value="Inter">Inter</option>
                <option value="Space Grotesk">Space Grotesk</option>
                <option value="Syne">Syne</option>
            </select>
        </div>
    </div>

    <span class="moon-icon">🌙</span>
    <h1 id="timerTitle">Alex's Sleep Timer</h1>
    
    <div class="time-display" id="timeDisplay">07:59:02</div>
    <div class="time-label" id="timeLabel">remaining</div>
    
    <div class="progress-track">
        <div class="progress-fill" id="progressBar" style="width:100%"></div>
    </div>
    <div class="progress-meta">
        <span id="metaLeft">0% elapsed</span>
        <span id="metaRight">100% left</span>
    </div>
    <div class="done-msg" id="doneMsg">✓ sleep timer finished</div>

    <div class="controls">
        <button class="btn-primary" id="mainBtn" onclick="toggleTimer()">Start</button>
        <button class="btn-ghost" onclick="resetTimer()">Reset</button>
        <button class="btn-share" id="shareBtn" onclick="shareTimer()">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
            Share
        </button>
    </div>

    <div class="divider"></div>
    <div class="duration-picker">
        <button class="dur-btn active" data-min="30" onclick="setDuration(30,this)">30m</button>
        <button class="dur-btn" data-min="60" onclick="setDuration(60,this)">1h</button>
        <button class="dur-btn" data-min="120" onclick="setDuration(120,this)">2h</button>
        <button class="dur-btn" data-min="180" onclick="setDuration(180,this)">3h</button>
        <button class="dur-btn" data-min="360" onclick="setDuration(360,this)">6h</button>
        <button class="dur-btn" data-min="480" onclick="setDuration(480,this)">8h</button>
    </div>
    <div class="custom-row">
        <label>Custom</label>
        <div class="time-input-group">
            <input type="number" id="inH" min="0" max="99" value="0">
            <span class="time-sep">:</span>
            <input type="number" id="inM" min="0" max="59" value="0">
            <span class="time-sep">:</span>
            <input type="number" id="inS" min="0" max="59" value="0">
        </div>
        <button class="btn-set" onclick="applyCustom()">Set</button>
    </div>
</div>

<script>
/* Background & Stars */
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let W, H, blobs;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
function makeBlobs() {
  blobs = [
    { x:W*0.20, y:H*0.15, r:W*0.38, color:[40,70,180], speed:0.00018, angle:0, amp:W*0.07 },
    { x:W*0.78, y:H*0.82, r:W*0.30, color:[80,30,130], speed:0.00024, angle:2.1, amp:W*0.09 },
    { x:W*0.55, y:H*0.45, r:W*0.25, color:[20,100,160], speed:0.00021, angle:4.5, amp:W*0.06 },
    { x:W*0.85, y:H*0.20, r:W*0.22, color:[100,50,200], speed:0.00015, angle:1.0, amp:W*0.05 },
    { x:W*0.10, y:H*0.75, r:W*0.20, color:[30,80,120], speed:0.00019, angle:3.3, amp:W*0.08 },
  ];
}
function drawBg(t) {
  ctx.fillStyle = '#07090d';
  ctx.fillRect(0, 0, W, H);
  for (const b of blobs) {
    const ox = Math.sin(t * b.speed * 1.3 + b.angle) * b.amp;
    const oy = Math.cos(t * b.speed + b.angle) * b.amp * 0.7;
    const cx = b.x + ox, cy = b.y + oy;
    const [r,g,bl] = b.color;
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, b.r);
    grad.addColorStop(0, `rgba(${r},${g},${bl},0.18)`);
    grad.addColorStop(0.5, `rgba(${r},${g},${bl},0.07)`);
    grad.addColorStop(1, `rgba(${r},${g},${bl},0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(cx, cy, b.r, b.r * 0.65, t * b.speed * 0.4 + b.angle, 0, Math.PI * 2);
    ctx.fill();
  }
}
window.addEventListener('resize', () => { resize(); makeBlobs(); });
resize(); makeBlobs();

/* Stars */
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = Math.random() * 1.8 + 0.4;
  s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;--del:-${(Math.random()*6).toFixed(1)}s;--min-op:${(Math.random()*0.08+0.02).toFixed(2)};--max-op:${(Math.random()*0.5+0.25).toFixed(2)};`;
  starsEl.appendChild(s);
}

/* Timer Logic */
let totalSeconds = 30 * 60;
let remaining = totalSeconds;
let running = false;
let ticker = null;
let endTimestamp = null;

const timeDisplay = document.getElementById('timeDisplay');
const timeLabel = document.getElementById('timeLabel');
const progressBar = document.getElementById('progressBar');
const mainBtn = document.getElementById('mainBtn');
const metaLeft = document.getElementById('metaLeft');
const metaRight = document.getElementById('metaRight');
const doneMsg = document.getElementById('doneMsg');
const toast = document.getElementById('toast');
const usernameInput = document.getElementById('username');
const fontSelect = document.getElementById('fontSelect');
const timerTitle = document.getElementById('timerTitle');

function fmt(s) {
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sc = s % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
}

function updateUI() {
  const pct = totalSeconds > 0 ? (remaining / totalSeconds) * 100 : 0;
  const elapsedPct = 100 - pct;
  const isEnding = pct <= 10 && pct > 0;
  const isDone = remaining === 0;

  timeDisplay.textContent = fmt(remaining);
  timeDisplay.className = 'time-display' + (isDone ? ' done' : isEnding ? ' ending' : '');
  progressBar.className = 'progress-fill' + (isDone ? ' done' : isEnding ? ' ending' : '');
  progressBar.style.width = pct.toFixed(3) + '%';
  metaLeft.textContent = Math.round(elapsedPct) + '% elapsed';
  metaRight.textContent = Math.round(pct) + '% left';
  timeLabel.textContent = isDone ? 'complete' : 'remaining';
}

function updateTitle() {
  const name = usernameInput.value.trim();
  timerTitle.textContent = name ? `${name}'s Sleep Timer` : "Sleep Timer";
}

function setDuration(minutes, el) {
  if (running) return;
  document.querySelectorAll('.dur-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  totalSeconds = minutes * 60;
  remaining = totalSeconds;
  doneMsg.classList.remove('show');
  updateUI();
}

function applyCustom() {
  if (running) return;
  const h = parseInt(document.getElementById('inH').value) || 0;
  const m = parseInt(document.getElementById('inM').value) || 0;
  const s = parseInt(document.getElementById('inS').value) || 0;
  const total = h * 3600 + m * 60 + s;
  if (total <= 0) return;
  document.querySelectorAll('.dur-btn').forEach(b => b.classList.remove('active'));
  totalSeconds = total;
  remaining = total;
  doneMsg.classList.remove('show');
  updateUI();
}

function tick() {
  if (remaining > 0) {
    remaining--;
    updateUI();
  } else {
    clearInterval(ticker);
    running = false;
    mainBtn.textContent = 'Restart';
    doneMsg.classList.add('show');
  }
}

function toggleTimer() {
  if (remaining === 0) { resetTimer(); return; }
  running = !running;
  mainBtn.textContent = running ? 'Pause' : 'Resume';
  if (running) {
    endTimestamp = Date.now() + remaining * 1000;
    ticker = setInterval(tick, 1000);
  } else {
    clearInterval(ticker);
    endTimestamp = null;
  }
}

function resetTimer() {
  clearInterval(ticker);
  running = false;
  remaining = totalSeconds;
  mainBtn.textContent = 'Start';
  doneMsg.classList.remove('show');
  updateUI();
}

function shareTimer() {
  const base = window.location.href.split('?')[0];
  let url;
  if (running && endTimestamp) {
    url = `${base}?end=${endTimestamp}&total=${totalSeconds}`;
  } else {
    const end = Date.now() + remaining * 1000;
    url = `${base}?end=${end}&total=${totalSeconds}&paused=1`;
  }
  navigator.clipboard.writeText(url).then(() => {
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }).catch(() => {
    prompt('Copy this link:', url);
  });
}

/* Font Change */
fontSelect.addEventListener('change', () => {
  const font = fontSelect.value;
  if (font === "DM Mono") {
    timeDisplay.style.fontFamily = "'DM Mono', monospace";
  } else {
    timeDisplay.style.fontFamily = `'${font}', sans-serif`;
  }
});

/* Username Change */
usernameInput.addEventListener('input', updateTitle);

/* Load shared timer from URL */
window.addEventListener('load', () => {
  const params = new URLSearchParams(window.location.search);
  const sharedEnd = parseInt(params.get('end')) || 0;
  const sharedTotal = parseInt(params.get('total')) || 0;
  const sharedPaused = params.get('paused') === '1';

  if (sharedEnd > 0 && sharedTotal > 0) {
    totalSeconds = sharedTotal;
    const msLeft = sharedEnd - Date.now();
    remaining = Math.max(0, Math.round(msLeft / 1000));
    updateUI();
    if (!sharedPaused && remaining > 0) {
      running = true;
      mainBtn.textContent = 'Pause';
      ticker = setInterval(tick, 1000);
    }
  }
  updateTitle();
});

/* Background Animation */
function loop(t) { drawBg(t); requestAnimationFrame(loop); }
requestAnimationFrame(loop);
updateUI();
</script>
</body>
</html>
