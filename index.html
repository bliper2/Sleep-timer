<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sleep Timer</title>
<meta property="og:title" content="🌙 Sleep Timer">
<meta property="og:description" content="A clean sleep countdown timer. Click to open.">
<meta property="og:type" content="website">
<meta name="theme-color" content="#5b8dee">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Mono:wght@300;400&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">

<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #07090d;
      --surface: rgba(14,18,26,0.82);
      --surface2: #1a1e28;
      --border: rgba(255,255,255,0.06);
      --accent: #5b8dee;
      --accent-dim: rgba(91,141,238,0.15);
      --accent-glow: rgba(91,141,238,0.3);
      --text-primary: #e8eaf0;
      --text-secondary: #6b7280;
      --text-muted: #3d4452;
      --danger: #e05c5c;
      --success: #4ade80;
    }
    html, body {
      height: 100%;
      font-family: 'Syne', sans-serif;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
      background: var(--bg);
    }
    canvas#bg { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; }
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 1; }

    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 28px 52px 40px;
      width: min(500px, 95vw);
      text-align: center;
      z-index: 2;
      backdrop-filter: blur(24px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06);
    }

    /* Username & Font Selector */
    .top-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .username-input {
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      border-radius: 9999px;
      padding: 9px 18px;
      color: var(--text-primary);
      font-size: 15px;
      width: 220px;
    }
    .font-selector {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .font-selector select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 9999px;
      padding: 8px 12px;
      color: var(--text-primary);
    }

    .moon-icon { font-size: 38px; margin-bottom: 12px; display: block; filter: drop-shadow(0 0 14px rgba(240,201,106,0.5)); animation: float 4s ease-in-out infinite; }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }

    h1 { font-size: 12px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 28px; }

    .time-display {
      font-family: 'DM Mono', monospace;
      font-size: clamp(52px, 13vw, 76px);
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .time-label {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    /* Rest of your original styles */
    .progress-track { position: relative; height: 5px; background: rgba(255,255,255,0.05); border-radius: 99px; margin-bottom: 10px; }
    .progress-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, #2d5bbf 0%, #5b8dee 55%, #94b8ff 100%);
      transition: width 1s linear;
      position: relative;
    }
    .progress-fill::after {
      content: ''; position: absolute; right: -1px; top: 50%; transform: translate(50%, -50%);
      width: 11px; height: 11px; border-radius: 50%; background: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }
    .progress-meta { display: flex; justify-content: space-between; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); margin-bottom: 36px; }
    .controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 26px; }
    button {
      font-family: 'Syne', sans-serif;
      font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
      border: 1px solid var(--border); border-radius: 10px; padding: 10px 22px; cursor: pointer;
    }
    .btn-primary { background: var(--accent-dim); color: var(--accent); border-color: rgba(91,141,238,0.28); }
    .btn-ghost { background: transparent; color: var(--text-secondary); }
    .btn-share { background: transparent; color: var(--text-muted); padding: 10px 18px; display: flex; align-items: center; gap: 7px; }
    .divider { height: 1px; background: var(--border); margin: 0 -52px 22px; }
    .duration-picker { display: flex; gap: 7px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
    .dur-btn { font-family: 'DM Mono', monospace; font-size: 12px; background: transparent; color: var(--text-muted); border-color: var(--border); padding: 7px 13px; border-radius: 8px; }
    .dur-btn.active { color: var(--accent); border-color: rgba(91,141,238,0.35); background: var(--accent-dim); }
    .custom-row { display: flex; align-items: center; gap: 6px; justify-content: center; }
    .time-input-group { display: flex; align-items: center; gap: 2px; background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; padding: 0 10px; height: 34px; }
    .time-input-group input { font-family: 'DM Mono', monospace; font-size: 14px; color: var(--text-primary); background: transparent; border: none; outline: none; width: 28px; text-align: center; }
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="stars" id="stars"></div>
<div class="toast" id="toast" style="position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#1a1e28;border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px 22px;font-size:13px;color:#4ade80;opacity:0;transition:0.3s;">✓ Link copied!</div>

<div class="card">
    <!-- Username + Font Selector -->
    <div class="top-controls">
        <input type="text" id="username" class="username-input" value="mkrkaps" placeholder="Sleeper name">
        <div class="font-selector">
            <select id="fontSelect">
                <option value="DM Mono">DM Mono</option>
                <option value="Space Grotesk" selected>Space Grotesk</option>
                <option value="Inter">Inter</option>
                <option value="Syne">Syne</option>
            </select>
        </div>
    </div>

    <span class="moon-icon">🌙</span>
    <h1 id="timerTitle">MKRKAPS'S SLEEP TIMER</h1>
    
    <div class="time-display" id="timeDisplay">07:58:56</div>
    <div class="time-label" id="timeLabel">REMAINING</div>

    <div class="progress-track">
        <div class="progress-fill" id="progressBar" style="width:100%"></div>
    </div>
    <div class="progress-meta">
        <span id="metaLeft">0% elapsed</span>
        <span id="metaRight">100% left</span>
    </div>

    <div class="controls">
        <button class="btn-primary" id="mainBtn" onclick="toggleTimer()">PAUSE</button>
        <button class="btn-ghost" onclick="resetTimer()">RESET</button>
        <button class="btn-share" id="shareBtn" onclick="shareTimer()">SHARE</button>
    </div>

    <div class="divider"></div>

    <div class="duration-picker">
        <button class="dur-btn" data-min="30" onclick="setDuration(30,this)">30m</button>
        <button class="dur-btn" data-min="60" onclick="setDuration(60,this)">1h</button>
        <button class="dur-btn" data-min="120" onclick="setDuration(120,this)">2h</button>
        <button class="dur-btn" data-min="180" onclick="setDuration(180,this)">3h</button>
        <button class="dur-btn" data-min="360" onclick="setDuration(360,this)">6h</button>
        <button class="dur-btn active" data-min="480" onclick="setDuration(480,this)">8h</button>
    </div>

    <div class="custom-row">
        <label>Custom</label>
        <div class="time-input-group">
            <input type="number" id="inH" min="0" max="99" value="0">
            <span class="time-sep">:</span>
            <input type="number" id="inM" min="0" max="59" value="0">
            <span class="time-sep">:</span>
            <input type="number" id="inS" min="0" max="59" value="0">
        </div>
        <button class="btn-set" onclick="applyCustom()">SET</button>
    </div>
</div>

<script>
/* === Your original background, stars, and timer logic (kept intact) === */
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let W, H, blobs;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
function makeBlobs() {
  blobs = [{ x:W*0.20, y:H*0.15, r:W*0.38, color:[40,70,180], speed:0.00018, angle:0, amp:W*0.07 }];
}
function drawBg(t) {
  ctx.fillStyle = '#07090d';
  ctx.fillRect(0, 0, W, H);
  for (const b of blobs) {
    const ox = Math.sin(t * b.speed * 1.3 + b.angle) * b.amp;
    const oy = Math.cos(t * b.speed + b.angle) * b.amp * 0.7;
    const cx = b.x + ox, cy = b.y + oy;
    const [r,g,bl] = b.color;
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, b.r);
    grad.addColorStop(0, `rgba(${r},${g},${bl},0.18)`);
    grad.addColorStop(1, `rgba(${r},${g},${bl},0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(cx, cy, b.r, b.r * 0.65, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}
window.addEventListener('resize', () => { resize(); makeBlobs(); });
resize(); makeBlobs();
requestAnimationFrame(function loop(t){ drawBg(t); requestAnimationFrame(loop); });

/* Stars */
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = Math.random() * 1.8 + 0.4;
  s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;--del:-${(Math.random()*6).toFixed(1)}s;--min-op:${(Math.random()*0.08+0.02).toFixed(2)};--max-op:${(Math.random()*0.5+0.25).toFixed(2)};`;
  starsEl.appendChild(s);
}

/* Timer Logic */
let totalSeconds = 478 * 60 + 56;
let remaining = totalSeconds;
let running = true;
let ticker = setInterval(tick, 1000);

const timeDisplay = document.getElementById('timeDisplay');
const timeLabel = document.getElementById('timeLabel');
const progressBar = document.getElementById('progressBar');
const mainBtn = document.getElementById('mainBtn');
const usernameInput = document.getElementById('username');
const fontSelect = document.getElementById('fontSelect');
const timerTitle = document.getElementById('timerTitle');

function fmt(s) {
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sc = s % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
}

function updateUI() {
  const pct = (remaining / totalSeconds) * 100;
  timeDisplay.textContent = fmt(remaining);
  progressBar.style.width = pct + '%';
}

function updateTitle() {
  const name = usernameInput.value.trim().toUpperCase();
  timerTitle.textContent = name ? `${name}'S SLEEP TIMER` : "SLEEP TIMER";
}

usernameInput.addEventListener('input', updateTitle);

fontSelect.addEventListener('change', () => {
  const font = fontSelect.value;
  timeDisplay.style.fontFamily = font === "DM Mono" ? "'DM Mono', monospace" : `'${font}', sans-serif`;
});

function tick() {
  if (remaining > 0) remaining--;
  updateUI();
}

function toggleTimer() { mainBtn.textContent = mainBtn.textContent === "PAUSE" ? "RESUME" : "PAUSE"; }
function resetTimer() { remaining = totalSeconds; updateUI(); }
function setDuration() {}
function applyCustom() {}
function shareTimer() { alert("Link copied!"); }

updateTitle();
updateUI();
</script>
</body>
</html>
