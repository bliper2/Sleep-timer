<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sleep Timer</title>
<meta property="og:title" content="🌙 Sleep Timer">
<meta property="og:description" content="A clean sleep countdown timer. Click to open.">
<meta property="og:type" content="website">
<meta name="theme-color" content="#5b8dee">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Mono:wght@300;400&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">

<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #07090d;
      --surface: rgba(15, 18, 28, 0.95);
      --border: rgba(255,255,255,0.08);
      --accent: #5b8dee;
      --text: #e8eaf0;
      --muted: #6b7280;
    }
    html, body {
      height: 100%;
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: var(--text);
    }
    canvas#bg { position: fixed; inset: 0; z-index: 0; }
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 1; }

    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px 24px 32px;
      width: min(420px, 95vw);
      text-align: center;
      z-index: 2;
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 60px rgba(0,0,0,0.6);
    }

    /* Top Bar */
    .top-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
    }
    .username-input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 9999px;
      padding: 8px 16px;
      color: white;
      font-size: 14.5px;
      text-align: center;
    }
    .font-select {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 9999px;
      padding: 8px 14px;
      color: white;
      font-size: 14px;
    }

    .moon-icon {
      font-size: 32px;
      margin: 4px 0 12px;
      display: block;
    }

    h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .time-display {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 68px;
      font-weight: 500;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }
    .time-label {
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .progress-track {
      height: 5px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      margin-bottom: 8px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #5b8dee, #a3c0ff);
      border-radius: 999px;
      width: 100%;
      position: relative;
    }
    .progress-fill::after {
      content: '';
      position: absolute;
      right: -6px;
      top: 50%;
      transform: translateY(-50%);
      width: 13px;
      height: 13px;
      background: #5b8dee;
      border-radius: 50%;
      box-shadow: 0 0 12px #5b8dee;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 26px;
    }
    button {
      padding: 9px 20px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary { background: rgba(91,141,238,0.15); color: #5b8dee; border: 1px solid rgba(91,141,238,0.4); }
    .btn-ghost { background: transparent; color: #888; border: 1px solid rgba(255,255,255,0.1); }

    .duration-picker {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .dur-btn {
      padding: 6px 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      font-size: 12px;
      color: #aaa;
    }
    .dur-btn.active {
      background: rgba(91,141,238,0.2);
      color: #5b8dee;
      border-color: #5b8dee;
    }
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="stars" id="stars"></div>

<div class="card">
    <div class="top-bar">
        <input type="text" id="username" class="username-input" value="mkrkaps">
        <select id="fontSelect" class="font-select">
            <option value="DM Mono">DM Mono</option>
            <option value="Space Grotesk" selected>Space Grotesk</option>
            <option value="Inter">Inter</option>
            <option value="Syne">Syne</option>
        </select>
    </div>

    <span class="moon-icon">🌙</span>
    <h1 id="timerTitle">MKRKAPS'S SLEEP TIMER</h1>
    
    <div class="time-display" id="timeDisplay">07:58:56</div>
    <div class="time-label">REMAINING</div>

    <div class="progress-track">
        <div class="progress-fill" id="progressBar"></div>
    </div>
    <div class="progress-meta">
        <span id="metaLeft">0% elapsed</span>
        <span id="metaRight">100% left</span>
    </div>

    <div class="controls">
        <button class="btn-primary" id="mainBtn">PAUSE</button>
        <button class="btn-ghost" onclick="resetTimer()">RESET</button>
        <button class="btn-ghost" onclick="shareTimer()">SHARE</button>
    </div>

    <div class="duration-picker">
        <button class="dur-btn" data-min="30" onclick="setDuration(30,this)">30m</button>
        <button class="dur-btn" data-min="60" onclick="setDuration(60,this)">1h</button>
        <button class="dur-btn" data-min="120" onclick="setDuration(120,this)">2h</button>
        <button class="dur-btn" data-min="180" onclick="setDuration(180,this)">3h</button>
        <button class="dur-btn" data-min="360" onclick="setDuration(360,this)">6h</button>
        <button class="dur-btn active" data-min="480" onclick="setDuration(480,this)">8h</button>
    </div>

    <div style="margin-top: 12px; display: flex; align-items: center; justify-content: center; gap: 8px;">
        <span style="color:#666; font-size:13px;">Custom</span>
        <div style="display:flex; background:rgba(255,255,255,0.06); border-radius:8px; padding:4px 8px;">
            <input type="number" id="inH" value="0" style="width:36px; text-align:center; background:transparent; border:none; color:white;">
            <span style="color:#555;">:</span>
            <input type="number" id="inM" value="0" style="width:36px; text-align:center; background:transparent; border:none; color:white;">
            <span style="color:#555;">:</span>
            <input type="number" id="inS" value="0" style="width:36px; text-align:center; background:transparent; border:none; color:white;">
        </div>
        <button onclick="applyCustom()" style="padding:6px 16px; font-size:12px;">SET</button>
    </div>
</div>

<script>
/* Background */
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
function drawBg(t) {
  ctx.fillStyle = '#07090d';
  ctx.fillRect(0, 0, W, H);
}
window.addEventListener('resize', resize);
resize();
requestAnimationFrame(function loop(t){ drawBg(t); requestAnimationFrame(loop); });

/* Timer */
let remaining = 7*3600 + 58*60 + 56;
const timeDisplay = document.getElementById('timeDisplay');
const timerTitle = document.getElementById('timerTitle');
const usernameInput = document.getElementById('username');
const fontSelect = document.getElementById('fontSelect');

function fmt(s) {
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
}

function updateUI() {
  timeDisplay.textContent = fmt(remaining);
}

usernameInput.addEventListener('input', () => {
  const name = usernameInput.value.trim().toUpperCase();
  timerTitle.textContent = name ? `${name}'S SLEEP TIMER` : "SLEEP TIMER";
});

fontSelect.addEventListener('change', () => {
  const font = fontSelect.value;
  timeDisplay.style.fontFamily = font === "DM Mono" ? "'DM Mono', monospace" : `'${font}', sans-serif`;
});

function tick() {
  if (remaining > 0) remaining--;
  updateUI();
}
setInterval(tick, 1000);

updateUI();
</script>
</body>
</html>
